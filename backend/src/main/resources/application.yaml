spring:
  application:
    name: backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/Enunas}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

security:
  jwt:
    secret-key: ${JWT_SECRET}
    expiration-time: ${JWT_EXPIRATION:86400000}

admin:
  email: ${ADMIN_EMAIL:admin@enunas.com}

enunas:
  platform:
    commission-rate: 0.18
  payout:
    hold-days: 7
    release-cron: "0 0 2 * * ?"

mollie:
  api:
    key: ${MOLLIE_API_KEY}
  webhook:
    url: ${MOLLIE_WEBHOOK_URL}

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
